<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unify Post-Sales - Talk Tracks &amp; Tactics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #161719;
    --surface-2: #1e2023;
    --border: rgba(255,255,255,0.07);
    --border-2: rgba(255,255,255,0.12);
    --text: #f2f2f0;
    --text-muted: #a8a8a4;
    --text-soft: #5a5a57;
    --accent: #4CAF7D;
    --accent-soft: rgba(76,175,125,0.15);
    --accent-border: rgba(76,175,125,0.35);
    --danger: #c0504a;
    --danger-soft: rgba(192,80,74,0.12);
    --danger-border: rgba(192,80,74,0.35);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100%; overflow: hidden;
  }

  /* ==== Password gate ==== */
  .gate {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a1c1f 0%, #0e0f11 75%);
    padding: 24px;
  }
  .gate.hidden { display: none; }
  .gate-card {
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    padding: 36px 32px;
    width: 100%; max-width: 380px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    text-align: center;
  }
  .gate-logo {
    display: inline-flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 16px; letter-spacing: -0.01em;
    margin-bottom: 24px;
  }
  .gate-card h1 {
    margin: 0 0 8px; font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
  }
  .gate-card p {
    margin: 0 0 24px; font-size: 13.5px; color: var(--text-muted); line-height: 1.5;
  }
  .gate-input {
    width: 100%;
    background: var(--surface-2); border: 1px solid var(--border-2);
    color: var(--text); font: inherit; font-size: 15px;
    padding: 11px 14px; border-radius: 8px; outline: none;
    text-align: center; letter-spacing: 0.06em;
    transition: border-color 0.15s;
  }
  .gate-input:focus { border-color: var(--accent-border); }
  .gate-error .gate-input { border-color: var(--danger-border); }
  .gate-btn {
    width: 100%; margin-top: 12px;
    background: var(--accent); color: #0e0f11; border: 0;
    font: inherit; font-size: 14px; font-weight: 700;
    padding: 11px 16px; border-radius: 8px; cursor: pointer;
    transition: background 0.15s;
  }
  .gate-btn:hover { background: #3d9a6a; }
  .gate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .gate-msg {
    min-height: 18px; margin-top: 10px;
    font-size: 12px; color: var(--text-soft); text-align: center;
  }
  .gate-msg.error { color: #e8908a; }

  /* ==== Tab bar (post-unlock) ==== */
  .tab-bar {
    display: flex; align-items: stretch;
    background: var(--surface);
    border-bottom: 1px solid var(--border-2);
    height: 52px;
    position: sticky; top: 0; z-index: 100;
    padding: 0 20px;
    gap: 4px;
  }
  .tab-brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 15px; letter-spacing: -0.01em;
    padding-right: 24px; margin-right: 8px;
    border-right: 1px solid var(--border-2);
  }
  .tab-btn {
    background: none; border: none;
    color: var(--text-muted);
    font-family: inherit; font-size: 14px; font-weight: 600;
    padding: 0 22px; cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .lock-btn {
    margin-left: auto;
    background: transparent; border: 1px solid var(--border-2);
    color: var(--text-soft); font: inherit; font-size: 12px;
    padding: 6px 12px; border-radius: 6px; cursor: pointer;
    align-self: center;
  }
  .lock-btn:hover { color: var(--text); border-color: var(--text-soft); }

  .tab-content { display: none; height: calc(100vh - 52px); width: 100%; }
  .tab-content.active { display: block; }
  .tab-content iframe { width: 100%; height: 100%; border: 0; display: block; }
</style>
</head>
<body>

<!-- Password gate -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-logo">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none"><rect width="18" height="18" rx="5" fill="#4CAF7D"/><path d="M5.5 6.5v3a3 3 0 006 0v-3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
      Unify Post-Sales
    </div>
    <h1>Internal playbook</h1>
    <p>This playbook is confidential to the Unify post-sales team. Enter the password to view.</p>
    <form id="gate-form" autocomplete="off">
      <input class="gate-input" type="password" id="gate-input" placeholder="Password" autocomplete="off" autofocus>
      <button class="gate-btn" type="submit" id="gate-submit">Unlock</button>
    </form>
    <div class="gate-msg" id="gate-msg"></div>
  </div>
</div>

<!-- Locked content (hidden until password unlocks) -->
<div id="content" style="display:none;">
  <div class="tab-bar">
    <div class="tab-brand">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none"><rect width="18" height="18" rx="5" fill="#4CAF7D"/><path d="M5.5 6.5v3a3 3 0 006 0v-3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
      Unify Post-Sales
    </div>
    <button class="tab-btn active" data-tab="talktracks">Talk Tracks</button>
    <button class="tab-btn" data-tab="tactics">Tactics</button>
    <button class="lock-btn" id="lock-btn" title="Lock the playbook">🔒 Lock</button>
  </div>
  <div class="tab-content active" id="tab-talktracks">
    <iframe id="iframe-talktracks" title="Talk Tracks"></iframe>
  </div>
  <div class="tab-content" id="tab-tactics">
    <iframe id="iframe-tactics" title="Tactics"></iframe>
  </div>
</div>

const STORAGE_KEY = 'unify-playbook-unlocked';

function xorDecrypt(b64Cipher, password) {
  const cipher = atob(b64Cipher);
  let out = '';
  for (let i = 0; i < cipher.length; i++) {
    out += String.fromCharCode(cipher.charCodeAt(i) ^ password.charCodeAt(i % password.length));
  }
  return out; // Should be the original base64-encoded HTML when password is correct
}

function tryUnlock(password) {
  if (!password) return false;
  let ttB64, tacB64;
  try {
    ttB64 = xorDecrypt(ENC_TT, password);
    tacB64 = xorDecrypt(ENC_TAC, password);
    // Validate: decoded base64 should start with HTML prefix
    const sample = atob(ttB64.substring(0, 60));
    if (!sample.startsWith('<!DOCTYPE')) return false;
  } catch (e) {
    return false;
  }
  // Inject decrypted data into iframes
  document.getElementById('iframe-talktracks').src = 'data:text/html;base64,' + ttB64;
  document.getElementById('iframe-tactics').src = 'data:text/html;base64,' + tacB64;
  // Reveal content, hide gate
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('content').style.display = 'block';
  // Persist for this session only
  try { sessionStorage.setItem(STORAGE_KEY, password); } catch (e) {}
  return true;
}

function lock() {
  try { sessionStorage.removeItem(STORAGE_KEY); } catch (e) {}
  // Clear iframe srcs and reload page so memory is wiped
  location.reload();
}

// Form handling
document.getElementById('gate-form').addEventListener('submit', e => {
  e.preventDefault();
  const input = document.getElementById('gate-input');
  const msg = document.getElementById('gate-msg');
  const card = document.querySelector('.gate-card');
  const ok = tryUnlock(input.value);
  if (!ok) {
    msg.textContent = 'Incorrect password.';
    msg.classList.add('error');
    card.classList.add('gate-error');
    input.value = '';
    input.focus();
    setTimeout(() => card.classList.remove('gate-error'), 600);
  }
});

// Try auto-unlock from sessionStorage
try {
  const saved = sessionStorage.getItem(STORAGE_KEY);
  if (saved) tryUnlock(saved);
} catch (e) {}

// Tab switcher
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
  });
});

// Lock button
document.getElementById('lock-btn').addEventListener('click', lock);
</script>
</body>
</html>
